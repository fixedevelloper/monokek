name: RestoPro Full Build

on:
  push:
    branches: [main, dev]

  workflow_dispatch:

jobs:

#################################################
# FRONTEND
#################################################
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

#################################################
# WINDOWS (TAURI)
#################################################
  windows:
    runs-on: windows-latest
    needs: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci
      - run: npm run build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: src-tauri/target/**/release/bundle/**/*.exe

#################################################
# ANDROID (TAURI)
#################################################
  android-tauri:
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - run: npm ci
      - run: npm run build

      - run: npx tauri android init || true
      - run: npx tauri android build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: "**/*.apk"

#################################################
# RELEASE
#################################################
  release:
    runs-on: ubuntu-latest
    needs: [windows, android-tauri]

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Show files
        run: ls -R dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}