name: RestoPro Full Build

on:
  push:
    branches: [main] # On ne fait des releases que sur main pour éviter le spam
  workflow_dispatch:

# CRITIQUE : Autoriser GitHub à écrire des fichiers (Releases)
permissions:
  contents: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  windows:
    runs-on: windows-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run build
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: src-tauri/target/release/bundle/msi/*.msi # Plus propre que **

  android-tauri:
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run build
      - run: npx tauri android build
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-artifact
          path: src-tauri/gen/android/app/build/outputs/apk/release/*.apk

  release:
    runs-on: ubuntu-latest
    needs: [windows, android-tauri]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true # Pour tout mettre dans le même dossier

      - name: Generate Tag Name
        id: tag
        run: echo "tag_name=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: MonoKek Release ${{ steps.tag.outputs.tag_name }}
          body: |
            Build automatique de MonoKek.
            - Version Windows (MSI/EXE)
            - Version Android (APK)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}