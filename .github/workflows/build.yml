name: RestoPro Full Build

on:
  push:
    branches: [main]
  workflow_dispatch:

# CRITIQUE : Autorise la création de la Release et l'upload des fichiers
permissions:
  contents: write

jobs:
#################################################
# FRONTEND
#################################################
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

#################################################
# WINDOWS (TAURI)
#################################################
  windows:
    runs-on: windows-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run build
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          # Chemin standard de sortie pour Tauri Windows
          path: src-tauri/target/release/bundle/msi/*.msi

#################################################
# ANDROID (TAURI)
#################################################
  android-tauri:
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3

      - run: npm ci
      - run: npm run build

      # On force le build de l'APK (installable) au lieu de l'AAB (Play Store)
      - run: npx tauri android build --apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-artifact
          # Chemin correct pour Tauri v2 Android
          path: src-tauri/gen/android/app/build/outputs/apk/release/*.apk

#################################################
# RELEASE (PUBLICATION)
#################################################
  release:
    runs-on: ubuntu-latest
    needs: [windows, android-tauri]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true # Très important : met le MSI et l'APK dans le même dossier

      - name: Generate Tag Name
        id: tag
        run: echo "tag_name=v0.1.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: MonoKek Release ${{ steps.tag.outputs.tag_name }}
          files: |
            release-assets/*.msi
            release-assets/*.apk
          body: |
            Nouvelle version de MonoKek.
            - Windows : Télécharger le fichier .msi
            - Android : Télécharger le fichier .apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}